<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>患者列表 - 君实生物临床端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .search-box {
            background: white; border-radius: 12px; height: 44px;
            display: flex; align-items: center; padding: 0 16px;
            border: 1px solid var(--glass-border); margin-bottom: 20px;
        }
        .search-input { border: none; flex: 1; outline: none; font-size: 14px; margin-left: 8px; }
        
        .patient-card {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px;
            box-shadow: var(--shadow-sm); border: 1px solid #F0F2F5;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>所有患者列表</h1>
    </div>

    <div class="container animate-up">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" class="search-input" placeholder="请输入患者姓名或手机号搜索">
        </div>

        <div id="patientList"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        App.checkAuth('patient-list.html');

        function renderList() {
            const list = document.getElementById('patientList');
            list.innerHTML = MockData.patients.map(p => `
                <div class="patient-card" onclick="App.navigateTo('patient-detail.html?id=${p.id}')">
                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                            <span style="font-size: 18px; font-weight: 700;">${p.name}</span>
                            <span style="font-size: 13px; color: var(--text-secondary);">${p.age} 岁</span>
                        </div>
                        <div style="font-size: 13px; color: var(--text-muted);">联系电话：${p.phone}</div>
                        <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">入组日期：${p.enrollDate}</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="status-tag status-${p.statusTag}" style="display: inline-block; margin-bottom: 10px;">${p.status}</div>
                        <div style="color: var(--primary-color); font-size: 12px; font-weight: 600;">临床全景 ›</div>
                    </div>
                </div>
            `).join('');
        }

        renderList();
    </script>
</body>
</html>
