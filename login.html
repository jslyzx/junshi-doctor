<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>登录 - 君实生物临床端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .login-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0052D9 0%, #002B80 100%);
            z-index: -1;
        }
        .login-logo {
            text-align: center; padding: 60px 0 30px; flex-shrink: 0;
        }
        .login-logo img { width: 140px; }
        .login-logo h1 { color: white; margin-top: 15px; font-size: 20px; font-weight: 300; letter-spacing: 2px; }
        
        .login-card {
            background: white;
            border-radius: 32px 32px 0 0;
            padding: 40px 30px;
            flex: 1;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .login-tip {
            font-size: 13px; color: var(--text-muted);
            margin-top: 24px; text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-bg"></div>
    
    <div class="login-logo">
        <div style="font-size: 48px;">🏥</div>
        <h1>君实生物 | 临床端</h1>
    </div>

    <div class="login-card animate-up">
        <div style="margin-bottom: 32px;">
            <h2 style="font-size: 24px; font-weight: 700; color: var(--text-main);">欢迎回来</h2>
            <p style="color: var(--text-secondary); font-size: 14px; margin-top: 4px;">请输入手机号进入您的临床管理后台</p>
        </div>

        <div style="margin-bottom: 24px;">
            <input type="tel" id="loginPhone" style="width: 100%; height: 56px; background: #F2F3F5; border: none; border-radius: 16px; padding: 0 20px; font-size: 16px; outline: none;" placeholder="请输入手机号">
        </div>

        <div style="margin-bottom: 40px; display: flex; gap: 12px;">
            <input type="number" id="loginCode" style="flex: 1; height: 56px; background: #F2F3F5; border: none; border-radius: 16px; padding: 0 20px; font-size: 16px; outline: none;" placeholder="验证码">
            <button style="width: 120px; border-radius: 16px; border: none; background: #E8F3FF; color: #0052D9; font-weight: 600; font-size: 14px;" onclick="sendMockCode()">获取验证码</button>
        </div>

        <button class="btn btn-primary" onclick="handleLogin()">立即登录</button>
        
        <div class="login-tip">
            <p>测试账号说明：</p>
            <p style="color: var(--primary-color); font-weight: 600; margin-top: 8px;">尾号 888 -> 医生端入口</p>
            <p style="color: #E37318; font-weight: 600; margin-top: 4px;">尾号 999 -> 项目专员入口</p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        App.checkAuth('login.html');

        function sendMockCode() {
            const phone = document.getElementById('loginPhone').value;
            if (!/^1\d{10}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }
            alert('【君实生物】验证码已发送：123456');
        }

        function handleLogin() {
            const phone = document.getElementById('loginPhone').value;
            const code = document.getElementById('loginCode').value;
            if (!phone || !code) {
                alert('请填写登录信息');
                return;
            }
            App.login(phone);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
