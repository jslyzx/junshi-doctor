<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数据统计 - 君实生物临床端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 模拟柱状图 */
        .bar-label { font-size: 10px; color: var(--text-secondary); margin-top: 8px; white-space: nowrap; }

        /* 图表背景装饰 */
        .chart-bar-container {
            display: flex; align-items: flex-end; justify-content: space-around;
            height: 160px; padding: 20px 10px; position: relative;
            background: rgba(0,0,0,0.02); border-radius: 12px;
        }
        .bar-wrapper {
            display: flex; flex-direction: column; align-items: center; width: 50px; z-index: 10;
        }
        .bar {
            width: 30px; border-radius: 6px 6px 0 0; min-height: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .bar-enroll { background: #0052D9 !important; }
        .bar-exit { background: #86909C !important; }
        .bar-meds { background: #2BA471 !important; }
        .bar-reduce { background: #FF9F43 !important; }
        .bar-adjust { background: #7367F0 !important; }
        .bar-stop { background: #4E5969 !important; }
        .bar-red { background: #D54941 !important; box-shadow: 0 0 10px rgba(213, 73, 65, 0.4); }
        .bar-yellow { background: #E37318 !important; }


        /* 模拟圆环图 */
        .donut-container {
            position: relative; width: 140px; height: 140px; margin: 20px auto;
        }
        .donut {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(var(--primary-color) 0% 80.5%, #E5E6EB 80.5% 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .donut::after {
            content: ''; position: absolute; width: 90px; height: 90px;
            background: white; border-radius: 50%;
        }
        .donut-val { position: relative; z-index: 10; font-size: 20px; font-weight: 700; color: var(--primary-color); }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>项目数据统计</h1>
    </div>

    <div class="container animate-up">
        <!-- 概括指标 -->
        <div class="stats-grid">
            <div class="stats-item" style="background: white;">
                <div class="stats-value">154</div>
                <div class="stats-label">累计入组</div>
            </div>
            <div class="stats-item" style="background: white;">
                <div class="stats-value">80.3%</div>
                <div class="stats-label">随访完成率</div>
            </div>
            <div class="stats-item" style="background: white;">
                <div class="stats-value">4.8%</div>
                <div class="stats-label">脱落率</div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div class="card-title" style="font-size: 15px; margin-bottom: 0;">患者状态分布</div>
                <div style="font-size: 11px; color: var(--text-muted);">单位：人</div>
            </div>

            <!-- 图表核心区域 -->
            <div class="chart-bar-container" style="gap: 4px; padding: 20px 4px;">
                <div class="bar-wrapper" style="width: auto; flex: 1;">
                    <div class="bar-value">154</div>
                    <div class="bar bar-enroll" style="height: 100%;"></div>
                    <div class="bar-label">入组</div>
                </div>
                <div class="bar-wrapper" style="width: auto; flex: 1;">
                    <div class="bar-value">32</div>
                    <div class="bar bar-exit" style="height: 25%;"></div>
                    <div class="bar-label">出组</div>
                </div>
                <div class="bar-wrapper" style="width: auto; flex: 1;">
                    <div class="bar-value">98</div>
                    <div class="bar bar-meds" style="height: 75%;"></div>
                    <div class="bar-label">用药中</div>
                </div>
                <div class="bar-wrapper" style="width: auto; flex: 1;">
                    <div class="bar-value">15</div>
                    <div class="bar bar-reduce" style="height: 15%;"></div>
                    <div class="bar-label">减量</div>
                </div>
                <div class="bar-wrapper" style="width: auto; flex: 1;">
                    <div class="bar-value">24</div>
                    <div class="bar bar-adjust" style="height: 20%;"></div>
                    <div class="bar-label">方案调整</div>
                </div>
                <div class="bar-wrapper" style="width: auto; flex: 1;">
                    <div class="bar-value">11</div>
                    <div class="bar bar-stop" style="height: 10%;"></div>
                    <div class="bar-label">停药</div>
                </div>
                <div class="bar-wrapper" style="width: auto; flex: 1;">
                    <div class="bar-value">5</div>
                    <div class="bar bar-red" style="height: 8%;"></div>
                    <div class="bar-label">红灯</div>
                </div>
                <div class="bar-wrapper" style="width: auto; flex: 1;">
                    <div class="bar-value">18</div>
                    <div class="bar bar-yellow" style="height: 16%;"></div>
                    <div class="bar-label">黄灯</div>
                </div>
            </div>

            <!-- 图表底部署名/说明 -->
            <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #F0F2F5; display: flex; justify-content: space-around; text-align: center;">
                <div>
                    <div style="font-size: 16px; font-weight: 700; color: var(--primary-color);">125</div>
                    <div style="font-size: 10px; color: var(--text-muted);">活跃患者</div>
                </div>
                <div style="border-left: 1px solid #F0F2F5;"></div>
                <div>
                    <div style="font-size: 16px; font-weight: 700; color: var(--warning-color);">29</div>
                    <div style="font-size: 10px; color: var(--text-muted);">今日新增</div>
                </div>
                <div style="border-left: 1px solid #F0F2F5;"></div>
                <div>
                    <div style="font-size: 16px; font-weight: 700; color: var(--info-color);">94.2%</div>
                    <div style="font-size: 10px; color: var(--text-muted);">依从指数</div>
                </div>
            </div>
        </div>

        <!-- 圆环图卡片 -->
        <div class="card">
            <div class="card-title" style="font-size: 15px;">随访阶段完成率</div>
            <div style="display: flex; align-items: center; justify-content: space-around;">
                <div class="donut-container">
                    <div class="donut"><div class="donut-val">80.5%</div></div>
                </div>
                <div style="font-size: 13px; color: var(--text-secondary);">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                        <div style="width: 10px; height: 10px; background: var(--primary-color); border-radius: 50%;"></div>
                        <span>已完成随访: 124人</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div style="width: 10px; height: 10px; background: #E5E6EB; border-radius: 50%;"></div>
                        <span>进行中/逾期: 30人</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        App.checkAuth('stats.html');
    </script>
</body>
</html>
