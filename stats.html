<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数据统计 - 君实生物临床端</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 模拟柱状图 */
        .chart-bar-container {
            display: flex; align-items: flex-end; justify-content: space-around;
            height: 200px; padding-top: 20px; margin-top: 20px;
        }
        .bar-wrapper {
            display: flex; flex-direction: column; align-items: center; width: 40px;
        }
        .bar-value { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .bar {
            width: 24px; background: var(--primary-gradient); border-radius: 6px 6px 0 0;
            transition: height 1s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .bar-label { font-size: 10px; color: var(--text-secondary); margin-top: 8px; white-space: nowrap; }

        /* 模拟圆环图 */
        .donut-container {
            position: relative; width: 140px; height: 140px; margin: 20px auto;
        }
        .donut {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(var(--primary-color) 0% 80.5%, #E5E6EB 80.5% 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .donut::after {
            content: ''; position: absolute; width: 90px; height: 90px;
            background: white; border-radius: 50%;
        }
        .donut-val { position: relative; z-index: 10; font-size: 20px; font-weight: 700; color: var(--primary-color); }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="history.back()">‹</div>
        <h1>项目数据统计</h1>
    </div>

    <div class="container animate-up">
        <!-- 概括指标 -->
        <div class="stats-grid">
            <div class="stats-item" style="background: white;">
                <div class="stats-value">154</div>
                <div class="stats-label">累计入组</div>
            </div>
            <div class="stats-item" style="background: white;">
                <div class="stats-value">80.3%</div>
                <div class="stats-label">随访完成率</div>
            </div>
            <div class="stats-item" style="background: white;">
                <div class="stats-value">4.8%</div>
                <div class="stats-label">脱落率</div>
            </div>
        </div>

        <!-- 柱状图卡片 -->
        <div class="card">
            <div class="card-title" style="font-size: 15px;">CRF 随访进度情况</div>
            <div class="chart-bar-container">
                <div class="bar-wrapper">
                    <div class="bar-value">30人</div>
                    <div class="bar" style="height: 100%;"></div>
                    <div class="bar-label">入选</div>
                </div>
                <div class="bar-wrapper">
                    <div class="bar-value">28人</div>
                    <div class="bar" style="height: 93%;"></div>
                    <div class="bar-label">随访 1</div>
                </div>
                <div class="bar-wrapper">
                    <div class="bar-value">16人</div>
                    <div class="bar" style="height: 53%;"></div>
                    <div class="bar-label">随访 2</div>
                </div>
                <div class="bar-wrapper">
                    <div class="bar-value">11人</div>
                    <div class="bar" style="height: 36%;"></div>
                    <div class="bar-label">随访 3</div>
                </div>
                <div class="bar-wrapper">
                    <div class="bar-value">27人</div>
                    <div class="bar" style="height: 90%;"></div>
                    <div class="bar-label">研究总结</div>
                </div>
            </div>
        </div>

        <!-- 圆环图卡片 -->
        <div class="card">
            <div class="card-title" style="font-size: 15px;">随访阶段完成率</div>
            <div style="display: flex; align-items: center; justify-content: space-around;">
                <div class="donut-container">
                    <div class="donut"><div class="donut-val">80.5%</div></div>
                </div>
                <div style="font-size: 13px; color: var(--text-secondary);">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                        <div style="width: 10px; height: 10px; background: var(--primary-color); border-radius: 50%;"></div>
                        <span>已完成随访: 124人</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div style="width: 10px; height: 10px; background: #E5E6EB; border-radius: 50%;"></div>
                        <span>进行中/逾期: 30人</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        App.checkAuth('stats.html');
    </script>
</body>
</html>
